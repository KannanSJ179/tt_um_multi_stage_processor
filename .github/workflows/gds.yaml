name: gds

on:
  push:
  workflow_dispatch:

jobs:
  gds:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Run OpenLane GDS flow
        uses: TinyTapeout/tt-gds-action/openlane@ttsky26a

  precheck:
    needs: gds
    runs-on: ubuntu-latest

    steps:
      - name: Run Tiny Tapeout Precheck
        uses: TinyTapeout/tt-gds-action/precheck@ttsky26a

  viewer:
    needs: gds
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write

    steps:
      - name: Run GDS Viewer
        uses: TinyTapeout/tt-gds-action/viewer@ttsky26a
