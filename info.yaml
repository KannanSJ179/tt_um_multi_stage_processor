# Tiny Tapeout project information
project:
  title:        "Multi-Stage Processor with Analog Feedback"
  author:       "Kannan S J"
  discord:      ""  
  description:  "A high-utilization mixed-signal processor with FSM-driven datapath and analog feedback injection"
  language:     "Verilog"
  clock_hz:     10000000

  tiles: "1x2"

  analog_pins: 2
  uses_3v3: false

  top_module:  "tt_um_multi_stage_processor"

  source_files:        
    - "tt_um_multi_stage_processor.v"

# Pinout
pinout:
  # Inputs
  ui[0]: "mode_sel[0]"
  ui[1]: "mode_sel[1]"
  ui[2]: "mode_sel[2]"
  ui[3]: "hold"
  ui[4]: "debug_sel[0]"
  ui[5]: "debug_sel[1]"
  ui[6]: "debug_sel[2]"
  ui[7]: "test_mode"

  # Outputs
  uo[0]: "data_out[0]"
  uo[1]: "data_out[1]"
  uo[2]: "data_out[2]"
  uo[3]: "data_out[3]"
  uo[4]: "data_out[4]"
  uo[5]: "data_out[5]"
  uo[6]: "data_out[6]"
  uo[7]: "data_out[7]"

  # Bidirectional pins
  uio[0]: "config[0]"
  uio[1]: "config[1]"
  uio[2]: "config[2]"
  uio[3]: "config[3]"
  uio[4]: "debug_out[4]"
  uio[5]: "debug_out[5]"
  uio[6]: "debug_out[6]"
  uio[7]: "debug_out[7]"

  # Analog pins
  ua[0]: "analog_out"
  ua[1]: "analog_in"
  ua[2]: ""
  ua[3]: ""
  ua[4]: ""
  ua[5]: ""

# Do not change!
yaml_version: 6
